<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>課程詳情 — CCS 證書管理系統</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{'ccs-blue':'#3165A7','ccs-teal':'#1A9A83','ccs-orange':'#F3982D','ccs-gray':'#58595B'}}}}</script>
  <link rel="stylesheet" href="../assets/css/app.css">
  <style>
    .lang-tab { flex:1; padding:8px 4px; font-size:.78rem; font-weight:600; color:#6b7280; background:transparent; border:none; cursor:pointer; border-right:1px solid #e5e7eb; transition:all .15s; }
    .lang-tab:last-child { border-right:none; }
    .lang-tab.active { background:white; color:#3165A7; }
    .info-label { font-size:.75rem; color:#6b7280; font-weight:500; margin-bottom:2px; }
    .info-value { font-size:.95rem; color:#1f2937; font-weight:500; }
    .drop-zone { border:2px dashed #d1d5db; border-radius:12px; padding:2rem; text-align:center; cursor:pointer; transition:all .2s; }
    .drop-zone:hover, .drop-zone.drag-over { border-color:#3165A7; background:#eff6ff; }
    .pdf-link { display:inline-flex; align-items:center; gap:3px; padding:2px 7px; border-radius:4px; font-size:.72rem; font-weight:600; background:#dcfce7; color:#166534; text-decoration:none; border:1px solid #bbf7d0; }
    .pdf-link:hover { background:#bbf7d0; }
  </style>
</head>
<body class="bg-gray-50">

  <div id="loading-screen"><div class="spinner"></div></div>

  <div id="app" style="display:none">
    <div id="sidebar" class="sidebar"></div>
    <div id="main-content">
      <div id="topbar"></div>
      <main class="flex-1 p-6 space-y-5">

        <!-- 返回 + 頁頭 -->
        <div class="flex items-center gap-3">
          <a href="index.html" class="btn-icon text-gray-500">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
          </a>
          <div class="flex-1">
            <h2 id="page-heading" class="text-xl font-bold text-gray-800">課程詳情</h2>
            <p id="page-subheading" class="text-sm text-gray-500"></p>
          </div>
          <button onclick="openEditProjectModal()" class="btn-secondary">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
            <span data-i18n="projects.edit_project">編輯課程資訊</span>
          </button>
        </div>

        <!-- 課程資訊卡 -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
          <div id="project-info-grid" class="grid grid-cols-2 sm:grid-cols-4 gap-5">
            <div><p class="info-label">客戶/企業</p><p id="info-client" class="info-value">—</p></div>
            <div><p class="info-label">課程名稱</p><p id="info-course" class="info-value">—</p></div>
            <div><p class="info-label">訓練日期</p><p id="info-date" class="info-value">—</p></div>
            <div><p class="info-label">訓練時數</p><p id="info-hours" class="info-value">—</p></div>
            <div><p class="info-label">證書編號前綴</p><p id="info-prefix" class="info-value">—</p></div>
            <div><p class="info-label">狀態</p><p id="info-status" class="info-value">—</p></div>
            <div><p class="info-label">學員總數</p><p id="info-count" class="info-value">—</p></div>
            <div><p class="info-label">發證進度</p><p id="info-progress" class="info-value">—</p></div>
          </div>
        </div>

        <!-- 學員名單 -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
          <div class="px-5 py-4 border-b border-gray-100 flex items-center justify-between gap-3 flex-wrap">
            <h3 class="font-bold text-gray-800" data-i18n="projects.students_section">學員名單</h3>
            <div class="flex gap-2 flex-wrap">
              <button onclick="downloadTemplate()" class="btn-secondary text-sm py-1.5">
                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                <span data-i18n="projects.download_template_btn">下載範本</span>
              </button>
              <button onclick="openImportModal()" class="btn-secondary text-sm py-1.5">
                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
                <span data-i18n="projects.import_excel_btn">匯入 Excel</span>
              </button>
              <button onclick="exportExcel()" class="btn-secondary text-sm py-1.5">
                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                <span data-i18n="projects.export_excel_btn">匯出名單</span>
              </button>
              <button onclick="openAddStudentModal()" class="btn-primary text-sm py-1.5">
                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
                <span data-i18n="projects.add_student_btn">新增學員</span>
              </button>
              <button onclick="startGenerateCerts()" class="btn-primary text-sm py-1.5" style="background:#1A9A83;border-color:#1A9A83;" id="btn-gen-all">
                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                產生證書
              </button>
            </div>
          </div>
          <div class="overflow-x-auto">
            <table class="data-table">
              <thead>
                <tr>
                  <th>#</th>
                  <th data-i18n="projects.col_name_zh">姓名（繁中）</th>
                  <th data-i18n="projects.col_name_en">姓名（英文）</th>
                  <th data-i18n="projects.col_email">Email</th>
                  <th data-i18n="projects.col_cert_no">證書編號</th>
                  <th data-i18n="projects.col_student_status">狀態</th>
                  <th>證書下載</th>
                  <th data-i18n="projects.col_actions">操作</th>
                </tr>
              </thead>
              <tbody id="students-tbody">
                <tr><td colspan="8" class="text-center py-12"><div class="spinner mx-auto"></div></td></tr>
              </tbody>
            </table>
          </div>
        </div>

      </main>
    </div>
  </div>

  <!-- ── 編輯課程 Modal ── -->
  <div id="project-modal" class="modal-overlay hidden">
    <div class="modal-box" style="max-width:640px">
      <div class="modal-header">
        <h3 class="modal-title" data-i18n="projects.edit_title">編輯課程專案</h3>
        <button onclick="UI.hideModal('project-modal')" class="btn-icon"><svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
      </div>
      <div class="modal-body space-y-4">
        <div>
          <label class="form-label">客戶/企業名稱 <span class="text-red-400">*</span></label>
          <input id="p-client" type="text" class="form-input" placeholder="例：康舒科技股份有限公司">
        </div>
        <div>
          <label class="form-label">課程名稱</label>
          <div class="border border-gray-200 rounded-lg overflow-hidden">
            <div class="flex border-b border-gray-200 bg-gray-50">
              <button type="button" onclick="switchPLang('zh_TW')" id="ptab-zh_TW" class="lang-tab active">繁中</button>
              <button type="button" onclick="switchPLang('zh_CN')" id="ptab-zh_CN" class="lang-tab">簡中</button>
              <button type="button" onclick="switchPLang('en')"    id="ptab-en"    class="lang-tab">EN</button>
              <button type="button" onclick="switchPLang('vi')"    id="ptab-vi"    class="lang-tab">VI</button>
            </div>
            <div class="p-3">
              <input id="p-name-zh_TW" type="text" class="form-input" placeholder="請輸入課程名稱">
              <input id="p-name-zh_CN" type="text" class="form-input hidden" placeholder="请输入课程名称">
              <input id="p-name-en"    type="text" class="form-input hidden" placeholder="Enter course name">
              <input id="p-name-vi"    type="text" class="form-input hidden" placeholder="Nhập tên khóa học">
            </div>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="form-label">訓練日期 <span class="text-red-400">*</span></label>
            <input id="p-date" type="date" class="form-input">
          </div>
          <div>
            <label class="form-label">訓練時數</label>
            <div class="flex items-center gap-2">
              <input id="p-hours" type="number" min="1" max="999" class="form-input" placeholder="8">
              <span class="text-sm text-gray-500 whitespace-nowrap">小時</span>
            </div>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="form-label">證書編號前綴</label>
            <input id="p-prefix" type="text" class="form-input" placeholder="例：CCS">
            <p class="text-xs text-gray-400 mt-1">格式：前綴-YYYYMM-序號</p>
          </div>
          <div>
            <label class="form-label">專案狀態</label>
            <select id="p-status" class="form-select">
              <option value="draft">草稿</option>
              <option value="active">進行中</option>
              <option value="completed">已完成</option>
            </select>
          </div>
        </div>
        <div>
          <label class="form-label">證書模板</label>
          <select id="p-template" class="form-select">
            <option value="">使用預設模板</option>
          </select>
          <p class="text-xs text-gray-400 mt-1">留空則使用系統預設模板</p>
        </div>
        <div id="p-error" class="hidden text-sm text-red-500 bg-red-50 p-3 rounded-lg"></div>
      </div>
      <div class="modal-footer">
        <button onclick="UI.hideModal('project-modal')" class="btn-secondary">取消</button>
        <button id="btn-save-p" onclick="saveProjectEdit()" class="btn-primary">儲存</button>
      </div>
    </div>
  </div>

  <!-- ── 新增/編輯學員 Modal ── -->
  <div id="student-modal" class="modal-overlay hidden">
    <div class="modal-box" style="max-width:560px">
      <div class="modal-header">
        <h3 id="s-modal-title" class="modal-title">新增學員</h3>
        <button onclick="UI.hideModal('student-modal')" class="btn-icon"><svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
      </div>
      <div class="modal-body space-y-4">
        <div class="border border-gray-200 rounded-lg overflow-hidden">
          <div class="flex border-b border-gray-200 bg-gray-50">
            <button type="button" onclick="switchSLang('zh_TW')" id="stab-zh_TW" class="lang-tab active">繁中</button>
            <button type="button" onclick="switchSLang('zh_CN')" id="stab-zh_CN" class="lang-tab">簡中</button>
            <button type="button" onclick="switchSLang('en')"    id="stab-en"    class="lang-tab">EN</button>
            <button type="button" onclick="switchSLang('vi')"    id="stab-vi"    class="lang-tab">VI</button>
          </div>
          <div class="p-3 space-y-2">
            <input id="s-name-zh_TW" type="text" class="form-input" placeholder="姓名（繁體中文）">
            <input id="s-name-zh_CN" type="text" class="form-input hidden" placeholder="姓名（简体中文）">
            <input id="s-name-en"    type="text" class="form-input hidden" placeholder="Full Name (English)">
            <input id="s-name-vi"    type="text" class="form-input hidden" placeholder="Họ và tên (Tiếng Việt)">
          </div>
        </div>
        <div>
          <label class="form-label">Email</label>
          <input id="s-email" type="email" class="form-input" placeholder="學員 Email（用於查閱證書，可留空）">
        </div>
        <div>
          <label class="form-label">證書編號</label>
          <input id="s-cert" type="text" class="form-input" placeholder="留空則自動產生">
        </div>
        <div id="s-error" class="hidden text-sm text-red-500 bg-red-50 p-3 rounded-lg"></div>
      </div>
      <div class="modal-footer">
        <button onclick="UI.hideModal('student-modal')" class="btn-secondary">取消</button>
        <button id="btn-save-s" onclick="saveStudent()" class="btn-primary">儲存</button>
      </div>
    </div>
  </div>

  <!-- ── 匯入 Excel Modal ── -->
  <div id="import-modal" class="modal-overlay hidden">
    <div class="modal-box" style="max-width:720px">
      <div class="modal-header">
        <h3 class="modal-title" data-i18n="projects.import_title">匯入學員名單</h3>
        <button onclick="UI.hideModal('import-modal')" class="btn-icon"><svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
      </div>
      <div class="modal-body">

        <!-- 選擇檔案 -->
        <div id="import-upload-section">
          <p class="text-sm text-gray-500 mb-4" data-i18n="projects.import_desc">
            請先下載 Excel 範本，填寫後上傳。支援 .xlsx / .xls 格式。
          </p>
          <div id="drop-zone" class="drop-zone"
            ondragover="event.preventDefault(); this.classList.add('drag-over')"
            ondragleave="this.classList.remove('drag-over')"
            ondrop="handleFileDrop(event)">
            <svg class="w-10 h-10 text-gray-400 mx-auto mb-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            <p class="text-sm text-gray-500 mb-3">拖曳 Excel 檔案至此，或</p>
            <label class="btn-secondary cursor-pointer">
              選擇檔案
              <input type="file" accept=".xlsx,.xls" class="hidden" onchange="handleFileInput(event)">
            </label>
          </div>
        </div>

        <!-- 預覽 -->
        <div id="import-preview-section" class="hidden">
          <div class="flex items-center justify-between mb-3">
            <p class="text-sm font-medium text-gray-700" id="import-count-msg"></p>
            <button onclick="resetImport()" class="text-sm text-gray-400 hover:text-gray-600">重新選擇</button>
          </div>
          <div class="overflow-x-auto border border-gray-200 rounded-lg max-h-64">
            <table class="data-table text-xs">
              <thead>
                <tr>
                  <th>#</th>
                  <th>姓名（繁中）</th>
                  <th>姓名（簡中）</th>
                  <th>姓名（英文）</th>
                  <th>姓名（越文）</th>
                  <th>Email</th>
                </tr>
              </thead>
              <tbody id="import-preview-tbody"></tbody>
            </table>
          </div>
          <div id="import-error" class="hidden mt-3 text-sm text-red-500 bg-red-50 p-3 rounded-lg"></div>
        </div>

      </div>
      <div class="modal-footer">
        <button onclick="UI.hideModal('import-modal')" class="btn-secondary">取消</button>
        <button id="btn-confirm-import" onclick="confirmImport()" class="btn-primary hidden">
          <span data-i18n="projects.import_confirm_btn">確認匯入</span>
        </button>
      </div>
    </div>
  </div>

  <!-- ── 刪除確認 ── -->
  <div id="del-student-modal" class="modal-overlay hidden">
    <div class="modal-box" style="max-width:420px">
      <div class="modal-header">
        <h3 class="modal-title text-red-600">確認刪除</h3>
        <button onclick="UI.hideModal('del-student-modal')" class="btn-icon"><svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
      </div>
      <div class="modal-body"><p id="del-student-msg" class="text-gray-600 text-sm"></p></div>
      <div class="modal-footer">
        <button onclick="UI.hideModal('del-student-modal')" class="btn-secondary">取消</button>
        <button id="btn-del-student" class="btn-danger">刪除</button>
      </div>
    </div>
  </div>

  <!-- ── 產生證書進度 Modal ── -->
  <div id="gen-modal" class="modal-overlay hidden">
    <div class="modal-box" style="max-width:480px">
      <div class="modal-header">
        <h3 id="gen-modal-title" class="modal-title">產生證書</h3>
      </div>
      <div class="modal-body space-y-4">
        <div>
          <div class="flex justify-between text-sm text-gray-600 mb-2">
            <span id="gen-status-text">準備中...</span>
            <span id="gen-progress-label"></span>
          </div>
          <div class="bg-gray-200 rounded-full h-2.5">
            <div id="gen-progress-bar" class="h-2.5 rounded-full transition-all duration-300" style="width:0%;background:#1A9A83;"></div>
          </div>
        </div>
        <div id="gen-log" class="text-xs text-gray-400 space-y-0.5 max-h-32 overflow-y-auto"></div>
        <div id="gen-error" class="hidden text-sm text-red-500 bg-red-50 p-3 rounded-lg"></div>
      </div>
      <div class="modal-footer">
        <button id="btn-gen-done" onclick="UI.hideModal('gen-modal')" class="btn-primary hidden">完成</button>
      </div>
    </div>
  </div>

  <!-- ── 隱藏 Cert Frame（用於 html2canvas 渲染）── -->
  <div id="cert-frame" style="position:fixed;top:-9999px;left:-9999px;width:960px;height:680px;overflow:hidden;font-family:'Noto Serif TC','Noto Sans TC',serif;">
    <div style="position:relative;width:100%;height:100%;">
      <img id="cert-frame-bg" alt="" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;">
      <div id="cert-frame-fields" style="position:absolute;inset:0;"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
  <!-- SheetJS for Excel import/export -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/init.js"></script>
  <script src="../assets/js/i18n.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/components.js"></script>

  <script>
    const params = new URLSearchParams(window.location.search);
    const PROJECT_ID = params.get('id');

    let _project = null;
    let _students = [];
    let _editingStudentId = null;
    let _importData = [];
    let _templates = [];

    async function loadTemplates() {
      try {
        const snap = await db.collection(Collections.TEMPLATES)
          .where('orgId', '==', APP_CONFIG.orgId).get();
        _templates = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      } catch (e) {
        console.warn('loadTemplates failed', e);
      }
    }

    function populateTemplateSelect(selectId, selectedId) {
      const sel = document.getElementById(selectId);
      sel.innerHTML = '<option value="">使用預設模板</option>';
      _templates.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t.id;
        opt.textContent = t.name + (t.isDefault ? '（預設）' : '');
        sel.appendChild(opt);
      });
      sel.value = selectedId || '';
    }

    (async () => {
      await UI.initAdminPage({ active: 'projects', titleKey: 'projects.title' });
      if (!PROJECT_ID) { window.location.href = 'index.html'; return; }
      await Promise.all([loadProject(), loadTemplates()]);
      await loadStudents();
    })();

    // ── 載入課程資訊 ──────────────────────────────
    async function loadProject() {
      const doc = await db.collection(Collections.PROJECTS).doc(PROJECT_ID).get();
      if (!doc.exists) { window.location.href = 'index.html'; return; }
      _project = { id: doc.id, ...doc.data() };
      renderProjectInfo();
    }

    function renderProjectInfo() {
      const p = _project;
      const lang = i18n.lang;
      const name = p.courseName?.[lang] || p.courseName?.zh_TW || '—';
      const date = p.trainingDate
        ? new Date(p.trainingDate + 'T00:00:00').toLocaleDateString('zh-TW') : '—';

      document.getElementById('page-heading').textContent = name !== '—' ? name : p.clientName;
      document.getElementById('page-subheading').textContent = p.clientName;
      document.getElementById('info-client').textContent  = p.clientName || '—';
      document.getElementById('info-course').textContent  = name;
      document.getElementById('info-date').textContent    = date;
      document.getElementById('info-hours').textContent   = p.hours ? `${p.hours} 小時` : '—';
      document.getElementById('info-prefix').textContent  = p.certPrefix || '（自動）';

    function genCertNumber(seq) {
      const prefix = (_project.certPrefix || 'CCS').toUpperCase();
      const now = new Date();
      const ym = now.getFullYear() + String(now.getMonth() + 1).padStart(2, '0');
      return `${prefix}-${ym}-${String(seq).padStart(3, '0')}`;
    }

    async function saveStudent() {
      const nameZhTW = document.getElementById('s-name-zh_TW').value.trim();
      if (!nameZhTW) {
        const el = document.getElementById('s-error');
        el.textContent = '繁體中文姓名為必填';
        el.classList.remove('hidden');
        return;
      }
      const btn = document.getElementById('btn-save-s');
      btn.disabled = true;

      try {
        if (_editingStudentId) {
          const data = {
            nameZhTW,
            nameZhCN: document.getElementById('s-name-zh_CN').value.trim(),
            nameEn:   document.getElementById('s-name-en').value.trim(),
            nameVi:   document.getElementById('s-name-vi').value.trim(),
            email:    document.getElementById('s-email').value.trim().toLowerCase(),
            certNumber: document.getElementById('s-cert').value.trim(),
            updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
          };
          await db.collection(Collections.PROJECTS).doc(PROJECT_ID)
            .collection(Collections.STUDENTS).doc(_editingStudentId).update(data);
          const idx = _students.findIndex(x => x.id === _editingStudentId);
          if (idx >= 0) _students[idx] = { ..._students[idx], ...data };
        } else {
          const seq = (_project.studentCount || 0) + 1;
          const certNumber = document.getElementById('s-cert').value.trim() || genCertNumber(seq);
          const data = {
            nameZhTW,
            nameZhCN: document.getElementById('s-name-zh_CN').value.trim(),
            nameEn:   document.getElementById('s-name-en').value.trim(),
            nameVi:   document.getElementById('s-name-vi').value.trim(),
            email:    document.getElementById('s-email').value.trim().toLowerCase(),
            certNumber,
            status: 'pending',
            pdfUrls: {},
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
          };
          const ref = await db.collection(Collections.PROJECTS).doc(PROJECT_ID)
            .collection(Collections.STUDENTS).add(data);
          _students.push({ id: ref.id, ...data });
          // 更新 project studentCount
          await db.collection(Collections.PROJECTS).doc(PROJECT_ID).update({
            studentCount: firebase.firestore.FieldValue.increment(1)
          });
          _project.studentCount = seq;
          document.getElementById('info-count').textContent = seq;
        }
        UI.hideModal('student-modal');
        UI.toast(i18n.t('projects.student_save_success'), 'success');
        renderStudents();
      } catch (e) {
        console.error(e);
        const el = document.getElementById('s-error');
        el.textContent = e.message || '儲存失敗';
        el.classList.remove('hidden');
      } finally {
        btn.disabled = false;
      }
    }

    function handleFileInput(e) {

    function parseExcel(file) {
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const wb = XLSX.read(e.target.result, { type: 'array' });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
          // 跳過第一行（標題）
          const data = rows.slice(1).filter(r => r.some(c => String(c).trim()));
          if (data.length === 0) {
            showImportError('檔案沒有有效資料，請確認填寫了第 2 列以後的資料');
            return;
          }
          _importData = data.map(r => ({
            nameZhTW: String(r[0] || '').trim(),
            nameZhCN: String(r[1] || '').trim(),
            nameEn:   String(r[2] || '').trim(),
            nameVi:   String(r[3] || '').trim(),
            email:    String(r[4] || '').trim().toLowerCase(),
          })).filter(s => s.nameZhTW);

          if (_importData.length === 0) {
            showImportError('沒有有效的繁體中文姓名，請確認第一欄填寫了姓名');
            return;
          }

          // 顯示預覽
          document.getElementById('import-upload-section').classList.add('hidden');
          document.getElementById('import-preview-section').classList.remove('hidden');
          document.getElementById('import-count-msg').textContent =
            i18n.t('projects.import_rows').replace('{count}', _importData.length);
          document.getElementById('import-preview-tbody').innerHTML = _importData.map((s, i) =>
            `<tr>
              <td>${i+1}</td>
              <td>${s.nameZhTW}</td>
              <td>${s.nameZhCN || '—'}</td>
              <td>${s.nameEn   || '—'}</td>
              <td>${s.nameVi   || '—'}</td>
              <td>${s.email    || '—'}</td>
            </tr>`
          ).join('');
          document.getElementById('btn-confirm-import').classList.remove('hidden');
        } catch (err) {
          showImportError('解析失敗：' + err.message);
        }
      };
      reader.readAsArrayBuffer(file);
    }

    // ── 證書生成 ──────────────────────────────────────────────

    const FIELD_IMG_TYPES = ['signature','logo'];

    async function urlToBase64(url) {
      try {
        const resp = await fetch(url);
        const blob = await resp.blob();
        return await new Promise((res, rej) => {
          const fr = new FileReader();
          fr.onload = () => res(fr.result);
          fr.onerror = rej;
          fr.readAsDataURL(blob);
        });
      } catch(e) { console.warn('urlToBase64 failed', url, e); return null; }
    }

    function formatCertDate(dateStr, lang) {
      if (!dateStr) return '';
      const d = new Date(dateStr + 'T00:00:00');
      const y = d.getFullYear(), m = d.getMonth()+1, day = d.getDate();
      if (lang === 'en')   return d.toLocaleDateString('en-US', {year:'numeric',month:'long',day:'numeric'});
      if (lang === 'vi')   return `Ngày ${day} tháng ${m} năm ${y}`;
      return `${y}年${m}月${day}日`;
    }

    function getCertFieldValue(type, student, project, org, lang, customText) {
      const suf = { zh_TW:'小時', zh_CN:'小时', en:'Hours', vi:'giờ' };
      const nameMap = { zh_TW: student.nameZhTW, zh_CN: student.nameZhCN, en: student.nameEn, vi: student.nameVi };
      switch(type) {
        case 'student_name':     return nameMap[lang] || student.nameZhTW || '';
        case 'course_name':      return project.courseName?.[lang] || project.courseName?.zh_TW || '';
        case 'training_date':    return formatCertDate(project.trainingDate, lang);
        case 'hours':            return project.hours ? `${project.hours} ${suf[lang]||suf.zh_TW}` : '';
        case 'cert_no':          return student.certNumber || '';
        case 'org_name':         return org[`name_${lang}`] || org.name_zh_TW || '';
        case 'authorized_name':  return org[`authorizedName_${lang}`] || org.authorizedName_zh_TW || '';
        case 'authorized_title': return org[`authorizedTitle_${lang}`] || org.authorizedTitle_zh_TW || '';
        case 'custom_text':      return customText || '';
        default: return '';
      }
    }

    function buildCertFrame(template, student, project, org, lang, bgB64, logoB64, sigB64) {
      const bgEl = document.getElementById('cert-frame-bg');
      if (bgB64) { bgEl.src = bgB64; bgEl.style.display = 'block'; }
      else bgEl.style.display = 'none';

      document.getElementById('cert-frame-fields').innerHTML = (template.fields || []).map(f => {
        if (FIELD_IMG_TYPES.includes(f.type)) {
          const src = f.type === 'logo' ? logoB64 : sigB64;
          if (!src) return '';
          return `<img src="${src}" style="position:absolute;left:${f.x}%;top:${f.y}%;width:${f.width}%;height:${f.height||8}%;object-fit:contain;object-position:left center;">`;
        }
        const text = getCertFieldValue(f.type, student, project, org, lang, f.customText);
        return `<div style="
          position:absolute;left:${f.x}%;top:${f.y}%;width:${f.width}%;
          transform:translateY(-50%);
          font-size:${f.fontSize}px;color:${f.fontColor};
          font-weight:${f.bold?700:400};text-align:${f.align||'center'};
          font-family:'Noto Serif TC','Noto Sans TC',serif;
          line-height:1.3;white-space:nowrap;overflow:visible;
        ">${text}</div>`;
      }).join('');
    }

      p.textContent = msg;
      el.appendChild(p);

    // startGenerateCerts(studentId?) — null = 全部待發學員
    async function startGenerateCerts(singleId) {
      const targets = singleId
        ? [singleId]
        : _students.filter(s => s.status !== 'generated').map(s => s.id);

      if (targets.length === 0) { UI.toast('所有學員已發證', 'success'); return; }

      // Load template — prefer project's assigned template, fall back to default
      let template = null;
      try {
        if (_project.templateId) {
          const tDoc = await db.collection(Collections.TEMPLATES).doc(_project.templateId).get();
          if (tDoc.exists) {
            template = { id: tDoc.id, ...tDoc.data() };
          }
        }
        if (!template) {
          // Fall back to org default template
          const snap = await db.collection(Collections.TEMPLATES)
            .where('orgId','==',APP_CONFIG.orgId)
            .where('isDefault','==',true).limit(1).get();
          if (snap.empty) {
            // fallback: any template
            const snap2 = await db.collection(Collections.TEMPLATES)
              .where('orgId','==',APP_CONFIG.orgId).limit(1).get();
            if (snap2.empty) {
              UI.toast('請先在「證書模板」建立並設為預設的模板', 'error'); return;
            }
            template = { id: snap2.docs[0].id, ...snap2.docs[0].data() };
          } else {
            template = { id: snap.docs[0].id, ...snap.docs[0].data() };
          }
        }
      } catch(e) { UI.toast('無法載入模板：' + e.message, 'error'); return; }

      // Load org
      let org = {};
      try {
        const orgDoc = await db.collection(Collections.ORG).doc(APP_CONFIG.orgId).get();
        if (orgDoc.exists) org = orgDoc.data();
      } catch(e) { console.warn('org load failed', e); }

      // Show progress modal
      document.getElementById('gen-modal-title').textContent =
        singleId ? '產生單筆證書' : `批次產生 ${targets.length} 位學員的證書`;
      document.getElementById('gen-status-text').textContent = '載入圖片資源...';
      document.getElementById('gen-progress-bar').style.width = '0%';
      document.getElementById('gen-progress-label').textContent = '';
      document.getElementById('gen-log').innerHTML = '';
      document.getElementById('gen-error').classList.add('hidden');
      document.getElementById('btn-gen-done').classList.add('hidden');
      UI.showModal('gen-modal');

      // Pre-load images as base64
      const bgB64   = template.bgImageUrl ? await urlToBase64(template.bgImageUrl) : null;
      const logoB64 = org.logoUrl          ? await urlToBase64(org.logoUrl)         : null;
      const sigB64  = org.signatureUrl     ? await urlToBase64(org.signatureUrl)    : null;

      const certLangs = _project.certLangs || ['zh_TW'];
      let doneCount = 0;

      for (const sid of targets) {
        const student = _students.find(s => s.id === sid);
        if (!student) continue;

        genLog(`處理：${student.nameZhTW || sid}`);
        document.getElementById('gen-status-text').textContent = `產生中：${student.nameZhTW || ''}`;

        const pdfUrls = { ...(student.pdfUrls || {}) };

        try {
          for (const lang of certLangs) {
            const langLabel = { zh_TW:'繁中', zh_CN:'簡中', en:'EN', vi:'VI' };
            genLog(`  → ${langLabel[lang] || lang}`);

            // Build cert frame
            buildCertFrame(template, student, _project, org, lang, bgB64, logoB64, sigB64);
            await new Promise(r => setTimeout(r, 150)); // wait for render

            // html2canvas → canvas
            const canvas = await html2canvas(document.getElementById('cert-frame'), {
              scale: 1.5, useCORS: true, allowTaint: false, logging: false,
              backgroundColor: '#ffffff',
            });

            // canvas → jsPDF
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF({ orientation:'landscape', unit:'px', format:[960,680], compress:true });
            pdf.addImage(canvas.toDataURL('image/jpeg', 0.92), 'JPEG', 0, 0, 960, 680);
            const blob = pdf.output('blob');

            // Upload to Storage
            const path = `certs/${APP_CONFIG.orgId}/${PROJECT_ID}/${sid}/${lang}.pdf`;
            const ref = storage.ref(path);
            await ref.put(blob, { contentType:'application/pdf' });
            pdfUrls[lang] = await ref.getDownloadURL();
          }

          // Update Firestore student
          await db.collection(Collections.PROJECTS).doc(PROJECT_ID)
            .collection(Collections.STUDENTS).doc(sid).update({
              status: 'generated', pdfUrls,
              updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
            });

          // Update local
          const idx = _students.findIndex(s => s.id === sid);
          if (idx >= 0) { _students[idx].status = 'generated'; _students[idx].pdfUrls = pdfUrls; }

        } catch(e) {
          genLog(`  ✗ 失敗：${e.message}`);
          console.error(sid, e);
        }

        doneCount++;
        genSetProgress(doneCount, targets.length);
      }

      // Update project generatedCount
      const genTotal = _students.filter(s => s.status === 'generated').length;
      await db.collection(Collections.PROJECTS).doc(PROJECT_ID).update({ generatedCount: genTotal });
      _project.generatedCount = genTotal;

      document.getElementById('gen-status-text').textContent = `完成！已產生 ${doneCount} 位學員的證書`;
      document.getElementById('btn-gen-done').classList.remove('hidden');
      renderProjectInfo();
      renderStudents();
    }

    async function confirmImport() {
      if (_importData.length === 0) return;
      const btn = document.getElementById('btn-confirm-import');
      btn.disabled = true;
      btn.querySelector('span').textContent = i18n.t('projects.import_importing');

      try {
        const batch = db.batch();
        const baseSeq = _project.studentCount || 0;

        _importData.forEach((s, i) => {
          const seq = baseSeq + i + 1;
          const certNumber = genCertNumber(seq);
          const ref = db.collection(Collections.PROJECTS).doc(PROJECT_ID)
            .collection(Collections.STUDENTS).doc();
          batch.set(ref, {
            ...s,
            certNumber,
            status: 'pending',
            pdfUrls: {},
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
          });
        });

        const projRef = db.collection(Collections.PROJECTS).doc(PROJECT_ID);
        batch.update(projRef, {
          studentCount: firebase.firestore.FieldValue.increment(_importData.length)
        });

        await batch.commit();

        _project.studentCount = (baseSeq + _importData.length);
        document.getElementById('info-count').textContent = _project.studentCount;

        UI.hideModal('import-modal');
        UI.toast(i18n.t('projects.import_success').replace('{count}', _importData.length), 'success');
        await loadStudents();
      } catch (e) {
        console.error(e);
        showImportError(i18n.t('projects.import_error') + '：' + e.message);
        btn.disabled = false;
        btn.querySelector('span').textContent = i18n.t('projects.import_confirm_btn');
      }
    }
  </script>
</body>
