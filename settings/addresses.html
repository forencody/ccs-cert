<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>地址資料庫 — CCS 證書管理系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{'ccs-blue':'#3165A7','ccs-teal':'#1A9A83','ccs-orange':'#F3982D','ccs-gray':'#58595B'}}}}</script>
  <link rel="stylesheet" href="../assets/css/app.css">
</head>
<body class="bg-gray-50">

  <div id="loading-screen"><div class="spinner"></div></div>

  <div id="app" style="display:none">
    <div id="sidebar"></div>
    <div id="main-content">
      <div id="topbar"></div>
      <main class="flex-1 p-6 max-w-5xl">

        <div class="flex items-center justify-between mb-6">
          <p class="text-gray-500 text-sm" data-i18n="addresses.desc">管理發證單位地址，可在課程專案中選用</p>
          <button onclick="openModal()" class="btn-primary">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
            <span data-i18n="addresses.add_btn">新增地址</span>
          </button>
        </div>

        <!-- 地址卡片清單 -->
        <div id="addresses-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="text-center py-16 text-gray-400 col-span-2">
            <div class="spinner mx-auto mb-3"></div>
          </div>
        </div>

      </main>
    </div>
  </div>

  <!-- 新增/編輯 Modal -->
  <div id="addr-modal" class="modal-overlay" style="display:none">
    <div class="modal-box" style="max-width:640px">
      <div class="modal-header">
        <h3 class="font-bold text-gray-800" id="modal-title" data-i18n="addresses.add_title">新增地址</h3>
        <button onclick="closeModal()" class="btn-icon">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

          <div class="md:col-span-2">
            <label class="form-label"><span data-i18n="addresses.label">地址名稱</span> <span class="text-red-400">*</span></label>
            <input id="f-label" class="form-input" data-i18n-placeholder="addresses.label_placeholder" placeholder="例：台南總公司">
          </div>

          <div>
            <label class="form-label" data-i18n="addresses.org_name_zh">組織名稱（中文）</label>
            <input id="f-org-zh" class="form-input">
          </div>
          <div>
            <label class="form-label" data-i18n="addresses.org_name_en">組織名稱（英文）</label>
            <input id="f-org-en" class="form-input">
          </div>
          <div class="md:col-span-2">
            <label class="form-label" data-i18n="addresses.org_name_vi">組織名稱（越文）</label>
            <input id="f-org-vi" class="form-input">
          </div>

          <div class="md:col-span-2">
            <label class="form-label" data-i18n="addresses.addr_zh">中文地址</label>
            <input id="f-addr-zh" class="form-input">
          </div>
          <div class="md:col-span-2">
            <label class="form-label" data-i18n="addresses.addr_en">英文地址</label>
            <input id="f-addr-en" class="form-input">
          </div>
          <div class="md:col-span-2">
            <label class="form-label" data-i18n="addresses.addr_vi">越文地址</label>
            <input id="f-addr-vi" class="form-input">
          </div>

          <div>
            <label class="form-label" data-i18n="addresses.phone">電話</label>
            <input id="f-phone" class="form-input" placeholder="+886(6)3123332">
          </div>
          <div>
            <label class="form-label" data-i18n="addresses.website">網站</label>
            <input id="f-website" class="form-input" placeholder="https://cc-sustain.com">
          </div>

        </div>
      </div>
      <div class="modal-footer">
        <button onclick="closeModal()" class="btn-secondary" data-i18n="app.cancel">取消</button>
        <button onclick="saveAddress()" class="btn-primary" id="btn-modal-save">
          <span data-i18n="app.save">儲存</span>
        </button>
      </div>
    </div>
  </div>

  <!-- 刪除確認 Modal -->
  <div id="delete-modal" class="modal-overlay" style="display:none">
    <div class="modal-box" style="max-width:400px">
      <div class="modal-header">
        <h3 class="font-bold text-gray-800">確認刪除</h3>
        <button onclick="closeDeleteModal()" class="btn-icon">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <p class="text-gray-600 text-sm" id="delete-msg"></p>
      </div>
      <div class="modal-footer">
        <button onclick="closeDeleteModal()" class="btn-secondary" data-i18n="app.cancel">取消</button>
        <button onclick="confirmDelete()" class="btn-danger" data-i18n="app.delete">刪除</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/init.js"></script>
  <script src="../assets/js/i18n.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/components.js"></script>
  <script>
    let _addresses = [];
    let _editingId = null;
    let _deletingId = null;

    // 預設地址（首次使用時植入）
    const DEFAULT_ADDRESSES = [
      {
        label: '台灣總公司',
        orgName: { zh: '成創永續股份有限公司', en: 'C.C.Sustain ESG Solution Co., Ltd.', vi: '' },
        addr: { zh: '710台南市永康區中華路1-12號', en: 'No. 1-12, Zhonghua Rd., Yongkang Dist., Tainan City 710, Taiwan (R.O.C.)', vi: '' },
        phone: '+886(6)3123332', website: 'https://www.cc-sustain.com', isDefault: true,
      },
      {
        label: '越南分公司',
        orgName: { zh: '越南成創永續責任有限公司', en: 'C.C.Sustain ESG Solution Co., Ltd.', vi: 'Công ty TNHH C.C.Sustain ESG Việt Nam' },
        addr: { zh: '', en: 'A18.05, Sunrise Riverside, Nha Be, Ho Chi Minh, Vietnam', vi: 'A18.05, Sunrise Riverside, Nha Be, Thành phố Hồ Chí Minh, Việt Nam' },
        phone: '+84.274.3777454', website: 'https://www.cc-sustain.com', isDefault: false,
      },
    ];

    (async () => {
      await UI.initAdminPage({ active: 'addresses', titleKey: 'addresses.title' });
      await loadAddresses();
    })();

    async function loadAddresses() {
      const ref = db.collection(Collections.ORG).doc(APP_CONFIG.orgId)
                    .collection(Collections.ADDRESSES).orderBy('createdAt', 'asc');
      const snap = await ref.get();

      if (snap.empty) {
        // 植入預設地址
        for (const addr of DEFAULT_ADDRESSES) {
          await db.collection(Collections.ORG).doc(APP_CONFIG.orgId)
            .collection(Collections.ADDRESSES).add({
              ...addr, orgId: APP_CONFIG.orgId,
              createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            });
        }
        const snap2 = await ref.get();
        _addresses = snap2.docs.map(d => ({ id: d.id, ...d.data() }));
      } else {
        _addresses = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      }
      renderAddresses();
    }

    function renderAddresses() {
      const grid = document.getElementById('addresses-grid');
      if (!_addresses.length) {
        grid.innerHTML = `<div class="col-span-2 empty-state"><p data-i18n="addresses.no_data">${i18n.t('addresses.no_data')}</p></div>`;
        return;
      }
      grid.innerHTML = _addresses.map(a => `
        <div class="address-card ${a.isDefault ? 'is-default' : ''}">
          <div class="flex items-start justify-between mb-3">
            <div>
              <span class="font-bold text-gray-800">${a.label}</span>
              ${a.isDefault ? `<span class="badge ml-2" style="background:#dbeafe;color:#1d4ed8" data-i18n="addresses.default_badge">${i18n.t('addresses.default_badge')}</span>` : ''}
            </div>
            <div class="flex gap-1">
              ${!a.isDefault ? `<button onclick="setDefault('${a.id}')" class="btn-icon" title="${i18n.t('addresses.set_default')}">
                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor" style="color:#f59e0b"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
              </button>` : ''}
              <button onclick="editAddress('${a.id}')" class="btn-icon">
                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
              </button>
              <button onclick="deleteAddress('${a.id}', '${a.label}')" class="btn-icon" style="color:#ef4444">
                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
              </button>
            </div>
          </div>
          ${a.orgName?.zh ? `<p class="text-sm text-gray-600 mb-1">${a.orgName.zh}</p>` : ''}
          ${a.orgName?.en ? `<p class="text-xs text-gray-400 mb-2">${a.orgName.en}</p>` : ''}
          ${a.addr?.zh ? `<p class="text-sm text-gray-600 flex gap-2"><svg class="w-4 h-4 text-gray-400 flex-shrink-0 mt-0.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>${a.addr.zh}</p>` : ''}
          ${a.addr?.en ? `<p class="text-xs text-gray-400 ml-6 mb-1">${a.addr.en}</p>` : ''}
          ${a.phone ? `<p class="text-sm text-gray-600 flex gap-2 mt-2"><svg class="w-4 h-4 text-gray-400 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>${a.phone}</p>` : ''}
          ${a.website ? `<p class="text-sm flex gap-2 mt-1"><svg class="w-4 h-4 text-gray-400 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9"/></svg><a href="${a.website}" target="_blank" class="text-ccs-blue hover:underline">${a.website}</a></p>` : ''}
        </div>`).join('');
    }

    function openModal(id = null) {
      _editingId = id;
      clearForm();
      if (id) {
        const a = _addresses.find(x => x.id === id);
        if (a) fillModalForm(a);
        document.getElementById('modal-title').textContent = i18n.t('addresses.edit_title');
      } else {
        document.getElementById('modal-title').textContent = i18n.t('addresses.add_title');
      }
      document.getElementById('addr-modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('addr-modal').style.display = 'none'; }

    function fillModalForm(a) {
      sf('f-label',   a.label);
      sf('f-org-zh',  a.orgName?.zh);
      sf('f-org-en',  a.orgName?.en);
      sf('f-org-vi',  a.orgName?.vi);
      sf('f-addr-zh', a.addr?.zh);
      sf('f-addr-en', a.addr?.en);
      sf('f-addr-vi', a.addr?.vi);
      sf('f-phone',   a.phone);
      sf('f-website', a.website);
    }

    function clearForm() {
      ['f-label','f-org-zh','f-org-en','f-org-vi','f-addr-zh','f-addr-en','f-addr-vi','f-phone','f-website']
        .forEach(id => sf(id, ''));
    }

    function sf(id, val) { const el = document.getElementById(id); if (el) el.value = val || ''; }
    function gf(id) { return document.getElementById(id)?.value?.trim() || ''; }

    function editAddress(id) { openModal(id); }

    async function saveAddress() {
      const label = gf('f-label');
      if (!label) { UI.toast(i18n.t('app.required_field'), 'warning'); return; }

      const btn = document.getElementById('btn-modal-save');
      btn.disabled = true;

      const payload = {
        label,
        orgName: { zh: gf('f-org-zh'), en: gf('f-org-en'), vi: gf('f-org-vi') },
        addr:    { zh: gf('f-addr-zh'), en: gf('f-addr-en'), vi: gf('f-addr-vi') },
        phone:   gf('f-phone'),
        website: gf('f-website'),
        orgId:   APP_CONFIG.orgId,
      };

      try {
        const col = db.collection(Collections.ORG).doc(APP_CONFIG.orgId).collection(Collections.ADDRESSES);
        if (_editingId) {
          await col.doc(_editingId).update({ ...payload, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
        } else {
          payload.isDefault = false;
          payload.createdAt = firebase.firestore.FieldValue.serverTimestamp();
          await col.add(payload);
        }
        closeModal();
        await loadAddresses();
        UI.toast(i18n.t('addresses.save_success'), 'success');
      } catch (e) {
        console.error(e);
        UI.toast(i18n.t('org.save_error'), 'error');
      } finally { btn.disabled = false; }
    }

    function deleteAddress(id, label) {
      _deletingId = id;
      document.getElementById('delete-msg').textContent = i18n.t('addresses.delete_confirm', { label });
      document.getElementById('delete-modal').style.display = 'flex';
    }

    function closeDeleteModal() { document.getElementById('delete-modal').style.display = 'none'; _deletingId = null; }

    async function confirmDelete() {
      if (!_deletingId) return;
      await db.collection(Collections.ORG).doc(APP_CONFIG.orgId)
        .collection(Collections.ADDRESSES).doc(_deletingId).delete();
      closeDeleteModal();
      await loadAddresses();
      UI.toast(i18n.t('addresses.delete_success'), 'success');
    }

    async function setDefault(id) {
      const batch = db.batch();
      const col = db.collection(Collections.ORG).doc(APP_CONFIG.orgId).collection(Collections.ADDRESSES);
      _addresses.forEach(a => batch.update(col.doc(a.id), { isDefault: a.id === id }));
      await batch.commit();
      await loadAddresses();
    }
  </script>
</body>
</html>
