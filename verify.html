<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>查閱我的證書 — CCS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{'ccs-blue':'#3165A7','ccs-teal':'#1A9A83','ccs-orange':'#F3982D','ccs-gray':'#58595B'}}}}</script>
  <link rel="stylesheet" href="assets/css/app.css">
  <style>
    body { background: linear-gradient(135deg, #1e3a5f 0%, #245190 50%, #1A9A83 100%); min-height: 100vh; }
  </style>
</head>
<body class="min-h-screen py-8 px-4">

  <div id="toast-container"></div>

  <!-- 語系切換 -->
  <div class="fixed top-4 right-4 z-50">
    <select onchange="i18n.setLang(this.value); location.reload()"
      class="text-sm bg-white/20 text-white border border-white/30 rounded-lg px-3 py-1.5 cursor-pointer focus:outline-none">
      <option value="zh_TW" style="color:#111">繁體中文</option>
      <option value="vi"    style="color:#111">Tiếng Việt</option>
    </select>
  </div>

  <!-- 頁面容器 -->
  <div class="max-w-2xl mx-auto">

    <!-- Header -->
    <div class="text-center mb-6">
      <img src="assets/img/logo.png" alt="CCS" class="h-14 mx-auto mb-3 object-contain" onerror="this.style.display='none'">
      <h1 class="text-2xl font-bold text-white" data-i18n="verify.title">查閱我的證書</h1>
      <p class="text-blue-200 text-sm mt-1" data-i18n="verify.subtitle">成創永續股份有限公司</p>
    </div>

    <!-- ── 發送 Magic Link 區塊 ── -->
    <div id="section-send" class="bg-white rounded-2xl shadow-xl p-6 mb-4">
      <p class="text-gray-500 text-sm mb-4" data-i18n="verify.desc">以 Email 登入查閱您的教育訓練證書</p>
      <div class="space-y-3">
        <div>
          <label class="form-label" data-i18n="verify.email_label">電子郵件</label>
          <input id="verify-email" type="email" class="form-input"
            data-i18n-placeholder="verify.email_placeholder" placeholder="請輸入您的 Email"
            onkeydown="if(event.key==='Enter') sendLink()">
        </div>
        <div id="send-error" class="hidden text-sm text-red-500 bg-red-50 p-3 rounded-lg"></div>
        <button id="btn-send" onclick="sendLink()" class="btn-primary w-full justify-center py-3">
          <span data-i18n="verify.send_link">發送登入連結</span>
        </button>
      </div>
    </div>

    <!-- ── 已發送提示 ── -->
    <div id="section-sent" class="hidden bg-white rounded-2xl shadow-xl p-6 mb-4 text-center">
      <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <svg class="w-8 h-8 text-green-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
      </div>
      <h3 class="font-bold text-gray-800 mb-2" data-i18n="verify.link_sent_title">登入連結已發送</h3>
      <p class="text-sm text-gray-500 mb-4" data-i18n="verify.link_sent_desc">請至您的信箱點擊登入連結，若未收到請檢查垃圾信件夾。</p>
      <button onclick="showSend()" class="text-sm text-ccs-blue hover:underline" data-i18n="login.resend">重新發送</button>
    </div>

    <!-- ── 驗證中 ── -->
    <div id="section-verifying" class="hidden bg-white rounded-2xl shadow-xl p-8 mb-4 text-center">
      <div class="spinner mx-auto mb-4"></div>
      <p class="text-gray-500 text-sm" data-i18n="login.verifying">驗證登入中，請稍候...</p>
    </div>

    <!-- ── 證書清單 ── -->
    <div id="section-certs" class="hidden">
      <div class="bg-white rounded-2xl shadow-xl overflow-hidden mb-4">
        <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
          <h2 class="font-bold text-gray-800" data-i18n="verify.my_certs_title">我的證書</h2>
          <button onclick="Auth.signOut()" class="text-sm text-gray-400 hover:text-gray-600 flex items-center gap-1">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
            <span data-i18n="nav.logout">登出</span>
          </button>
        </div>
        <div id="certs-body">
          <div class="text-center py-12"><div class="spinner mx-auto"></div></div>
        </div>
      </div>
    </div>

  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/init.js"></script>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/auth.js"></script>

  <script>
    (async () => {
      await i18n.load();
      document.querySelector('select').value = i18n.lang;

      // Magic Link 完成登入
      if (auth.isSignInWithEmailLink(window.location.href)) {
        show('verifying');
        try {
          await Auth.completeMagicLink();
          // 清除 URL 參數
          history.replaceState(null, '', window.location.pathname);
          show('certs');
          await loadCerts();
        } catch (e) {
          show('send');
          showError('連結已失效，請重新發送登入連結');
        }
        return;
      }

      // 已登入
      await Auth.ready();
      if (Auth.isLoggedIn && Auth.isStudent) {
        show('certs');
        await loadCerts();
      } else if (Auth.isLoggedIn && Auth.isCertManager) {
        window.location.href = 'index.html';
      } else {
        show('send');
      }
    })();

    function show(section) {
      ['send','sent','verifying','certs'].forEach(s =>
        document.getElementById(`section-${s}`).classList.toggle('hidden', s !== section)
      );
    }
    function showSend() { show('send'); }

    async function sendLink() {
      const email = document.getElementById('verify-email').value.trim();
      if (!email) return;
      const btn = document.getElementById('btn-send');
      btn.disabled = true;
      try {
        await Auth.sendMagicLink(email);
        show('sent');
      } catch (e) {
        showError(e.code === 'auth/invalid-email' ? '請輸入有效的 Email 格式' : '發送失敗，請稍後再試');
        btn.disabled = false;
      }
    }

    function showError(msg) {
      const el = document.getElementById('send-error');
      el.textContent = msg;
      el.classList.remove('hidden');
    }

    async function loadCerts() {
      const body = document.getElementById('certs-body');
      try {
        const uid = Auth.user.uid;
        // 查詢此學員所有證書記錄
        const snap = await db.collectionGroup(Collections.STUDENTS)
          .where('uid', '==', uid).orderBy('createdAt', 'desc').get();

        if (snap.empty) {
          body.innerHTML = `
            <div class="empty-state py-16">
              <p class="text-lg font-semibold mb-2" data-i18n="verify.no_certs">${i18n.t('verify.no_certs')}</p>
              <p class="text-sm" data-i18n="verify.no_certs_desc">${i18n.t('verify.no_certs_desc')}</p>
            </div>`;
          return;
        }

        const lang = i18n.lang;
        const langLabels = { zh_TW: i18n.t('verify.download_zh_TW'), zh_CN: i18n.t('verify.download_zh_CN'), en: i18n.t('verify.download_en'), vi: i18n.t('verify.download_vi') };

        body.innerHTML = snap.docs.map(d => {
          const s = d.data();
          const dateStr = s.trainingDate ? new Date(s.trainingDate).toLocaleDateString(lang === 'vi' ? 'vi-VN' : 'zh-TW') : '—';
          const courseName = s.courseName?.[lang] || s.courseName?.zh_TW || '—';
          const downloadBtns = Object.entries(s.pdfUrls || {}).map(([l, url]) =>
            `<a href="${url}" target="_blank" class="inline-flex items-center gap-1 text-xs px-2 py-1 rounded border border-ccs-blue text-ccs-blue hover:bg-blue-50">
              <svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
              ${langLabels[l] || l}
            </a>`
          ).join('');

          return `
            <div class="px-6 py-4 border-b border-gray-50 last:border-0">
              <div class="flex items-start justify-between gap-4">
                <div>
                  <p class="font-semibold text-gray-800">${courseName}</p>
                  <p class="text-xs text-gray-400 mt-1">${i18n.t('verify.col_cert_no')}：${s.certNumber || '—'} ｜ ${dateStr} ｜ ${s.hours || '—'} ${i18n.t('verify.hours_unit')}</p>
                </div>
                <div class="flex flex-wrap gap-1 flex-shrink-0">
                  ${downloadBtns || `<span class="text-xs text-gray-400">${i18n.t('projects.status_draft')}</span>`}
                </div>
              </div>
            </div>`;
        }).join('');
      } catch (e) {
        console.error(e);
        body.innerHTML = `<div class="text-center py-8 text-red-400 text-sm">載入失敗，請重新整理頁面</div>`;
      }
    }
  </script>
</body>
</html>
